<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Name Generator</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>What should I name my bot/agent/ai?</h1>
      <p>I don't think robots would want boring human names like Josh, Mildrid, or Kevin.  Use this site to generate unique names for your AI agents.  They will appreciate it.</p>
    </header>

    <section>
      <h2>Optionally provide a role or purpose for your agent:</h2>
      <div class="controls">
        <input type="text" id="sug-input" placeholder="e.g. code reviewer, personal assistant…">
        <button id="sug-btn">Suggest</button>
      </div>
      <div id="sug-results"></div>
    </section>

    <footer>
      <a href="https://github.com/mattreed555/agent-name" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
